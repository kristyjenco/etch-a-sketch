<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Etch-a-Sketch</title>
       <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background-color: lightpink;
        }

        #parent {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            flex-direction: row;
            align-items: center;
            width: 512px;
            height: 512px;
            background-color: black;
        }
        #parent > div {
            border: 1px solid gray;
            box-sizing: border-box;
            display: flex;
            flex-shrink: 0;
        }
        button {
            background-color: white;
            border-color:#AA336A;
            color: #AA336A;
            padding: 10px;
        }
       </style>
    </head>
    <body>
        <div id="buton-div"><button type="button" id="button">Choose grid size</button></div>
        <div id="parent"></div>
        <script>
        let parentDiv = document.getElementById("parent");
        let containerSize = 512;
        function createGrid (gridNumber = 16) {
            parentDiv.innerHTML = "";
            for(let i = 0; i < gridNumber * gridNumber; i++) {
               let newDiv = document.createElement("div");
                newDiv.classList.add("square");
                let size = containerSize / gridNumber;
                newDiv.style.width = `${size}px`;
                newDiv.style.height = `${size}px`;
                newDiv.style.backgroundColor = "white";
                parentDiv.appendChild(newDiv);
                newDiv.addEventListener("mouseover", () => {
                    let opacity = window.getComputedStyle(newDiv).getPropertyValue("opacity");
                        if(opacity == "")
                        {
                           let opacity = 0.1;
                        }
                        if(opacity <= 1.0)
                        {
                            opacity -= 0.1;
                            newDiv.style.opacity = opacity;
                        }
                    
                    });
                }
        }
        createGrid();
    button = document.getElementById("button");
    button.addEventListener("click", () => {
       let input = prompt("Enter a number greater than 1 and less than 100");
       let gridNumber = input ? input : 16;
       let size = containerSize / gridNumber;
        if(gridNumber >= 1 && gridNumber <= 100) {
            createGrid(gridNumber);
        }
        else 
        {
            alert("Please choose a number between 1 and 100");
            createGrid(16);
        }
    })
    </script>
    </body>
    
</html>
